<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acali Studios | RetroTAP</title>
    <style>
        /* Enables the smooth gliding effect when clicking the button */
        html { 
            scroll-behavior: smooth; 
        }

        body {

<nav class="main-nav">
    <div class="nav-brand">ACALI STUDIOS</div>
    <div class="nav-links">
        <a href="#apps">Apps</a>
        <a href="/retroTAP/privacy-policy">Privacy Policy</a>
        <a href="mailto:your-email@example.com">Contact</a>
    </div>
</nav>

            background-color: #1a1410; /* Dark tone to blend with logo edges */
            color: #f4f1ea;
            margin: 0;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The main landing view */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .logo-frame {
            max-width: 900px;
            width: 100%;
            height: auto;
            border: 1px solid #d1ccc0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .cta-button {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 35px;
            border: 1px solid #f4f1ea;
            color: #f4f1ea;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s;
        }

        .cta-button:hover {
            background: #f4f1ea;
            color: #1a1410;
        }

        /* The destination section for the button */
        #gallery {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f4f1ea; /* Swaps to light canvas for the art area */
            color: #1a1a1a;
            text-align: center;
        }

        .gallery-content {
            max-width: 800px;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="ACALI logo.png" alt="Acali Studios Logo" class="logo-frame">
        <br>
        <a href="#gallery" class="cta-button">Enter the Studio</a>
    </div>

    <div id="gallery">
        <div class="gallery-content">
            <h2>Our Collection</h2>
            <p>The doors are open. Explore the works of Acali Studios.</p>
        </div>
    </div>

</body>
</html>
