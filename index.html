<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acali Studios | RetroTAP</title>
    <style>
    body {


    background-color: #f4f1ea; /* "Canvas" off-white */
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    font-family: 'Georgia', serif; /* A more classical, artistic font */
}

.container {
    text-align: center;
    max-width: 800px;
    padding: 40px;
    border: 1px solid #d1ccc0;
    background: #ffffff;
    box-shadow: 10px 10px 0px #d1ccc0; /* Stylized "shadow" */
}

h1 {
    font-size: 3.5rem;
    font-weight: normal;
    font-style: italic;
    margin-bottom: 20px;
    border-bottom: 2px solid #1a1a1a;
    display: inline-block;
}

.cta-button {
    display: inline-block;
    margin-top: 30px;
    padding: 12px 30px;
    border: 2px solid #1a1a1a;
    color: #1a1a1a;
    text-decoration: none;
    font-weight: bold;
transition: background 0.3s;
}

.cta-button:hover {
    background: #1a1a1a;
    color: #f4f1ea;
}
    </style>
</head>

<body>
    <div class="container">
        <h1>ACALI Studios</h1>
        <p>Your friendly neighborhood game studio. Something exciting is coming soon.</p>
        <a href="#" class="cta-button">Stay Updated</a>
    </div>
</body>
</html>
